name: Deploy to GitHub Pages

# Site is intentionally unpublished for now. Deploys are manual-only:
# GitHub → Actions → "Deploy to GitHub Pages" → Run workflow.
# To restore deploy-on-push, put the push trigger back:
#   push:
#     branches: [main]
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Publishes dist/ to the gh-pages branch. Creating that branch
      # auto-enables GitHub Pages for the repository — no settings click
      # required. Site: https://ingenieria-olvera.github.io/OA-Tech/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
